<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Гоша ест! 🦕</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d2b;--bg2:#16163a;--card:#1e1e4a;
  --accent:#a78bfa;--green:#4ade80;--yellow:#fbbf24;
  --text:#f0f0ff;--text2:#a0a0cc;--radius:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* Stars */
.stars{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--d) infinite alternate;}
@keyframes twinkle{from{opacity:.1;}to{opacity:1;}}

.page{position:relative;z-index:1;padding:20px 16px 110px;max-width:430px;margin:0 auto;}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.logo{font-size:22px;font-weight:800;color:var(--accent);}
.header-right{display:flex;align-items:center;gap:8px;}
.date-chip{background:var(--card);border-radius:99px;padding:6px 14px;font-size:13px;color:var(--text2);font-weight:700;}
.settings-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px 8px;opacity:.6;transition:opacity .15s;}
.settings-btn:active{opacity:1;}

/* Dino mascot */
.dino-box{text-align:center;margin-bottom:22px;}
.dino-emoji{font-size:72px;display:block;animation:bounce 2.2s ease-in-out infinite;line-height:1.1;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.dino-say{margin-top:10px;font-size:16px;color:var(--text2);font-weight:600;}
.dino-chips{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
.dino-chip{border-radius:99px;padding:6px 16px;font-size:15px;font-weight:800;}
.dino-chip.fire{background:rgba(251,191,36,.15);color:var(--yellow);}
.dino-chip.spark{background:rgba(167,139,250,.15);color:var(--accent);}

/* Big photo button */
.big-btn{width:100%;background:linear-gradient(135deg,#7c3aed,#a78bfa);border:none;border-radius:var(--radius);padding:26px;font-size:22px;font-weight:800;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:22px;box-shadow:0 4px 28px rgba(124,58,237,.45);transition:transform .1s;font-family:'Space Grotesk',sans-serif;}
.big-btn:active{transform:scale(.96);}

/* Section title */
.section-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;}

/* Meal grid */
.meal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.meal-card{background:var(--card);border-radius:16px;overflow:hidden;position:relative;}
.meal-card img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
.meal-card-label{position:absolute;bottom:0;left:0;right:0;background:rgba(13,13,43,.85);padding:6px 10px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px;}
.meal-card-time{margin-left:auto;font-size:11px;color:var(--text2);}
.meal-card-del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);border:none;color:white;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.meal-card-cal{padding:7px 9px;font-size:13px;font-weight:700;color:var(--yellow);display:flex;align-items:center;gap:5px;border-top:1px solid rgba(255,255,255,.06);}
.meal-card-cal b{font-size:15px;}
.meal-card-analysis{padding:7px 9px;font-size:11px;color:var(--text2);line-height:1.4;border-top:1px solid rgba(255,255,255,.06);}
.empty-state{text-align:center;padding:28px 0;color:var(--text2);font-size:15px;font-weight:600;grid-column:span 2;}
.empty-emoji{font-size:44px;display:block;margin-bottom:10px;}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid rgba(255,255,255,.08);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:6px 0;color:var(--text2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;transition:color .15s;font-family:'Space Grotesk',sans-serif;}
.nav-btn.active{color:var(--accent);}
.nav-btn span:first-child{font-size:22px;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{width:100%;max-width:430px;margin:0 auto;background:var(--bg2);border-radius:24px 24px 0 0;padding:16px 20px 44px;transform:translateY(40px);transition:transform .25s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:99px;margin:0 auto 20px;}
.modal-title{font-size:22px;font-weight:800;margin-bottom:20px;text-align:center;}

/* Meal type grid */
.meal-type-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.mt-btn{background:var(--card);border:2px solid transparent;border-radius:16px;padding:20px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all .15s;font-family:'Space Grotesk',sans-serif;color:var(--text);}
.mt-btn:active{transform:scale(.96);}
.mt-btn.selected{border-color:var(--accent);background:rgba(167,139,250,.15);}
.mt-emoji{font-size:40px;}
.mt-name{font-size:16px;font-weight:700;}

/* History */
.hist-day{margin-bottom:24px;}
.hist-day-title{font-size:14px;font-weight:700;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.hist-day-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08);}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;}
.stat-card{background:var(--card);border-radius:14px;padding:12px 6px;text-align:center;}
.stat-val{font-size:22px;font-weight:800;color:var(--accent);display:block;}
.stat-lbl{font-size:10px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.03em;}

/* Export button */
.export-btn{width:100%;background:var(--card);border:2px solid var(--accent);border-radius:var(--radius);padding:16px;font-size:16px;font-weight:700;color:var(--accent);cursor:pointer;font-family:'Space Grotesk',sans-serif;margin-top:4px;transition:all .15s;}
.export-btn:active{background:rgba(167,139,250,.15);}

/* Celebrate */
.celebrate{position:fixed;inset:0;background:rgba(13,13,43,.93);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;pointer-events:none;transition:opacity .3s;}
.celebrate.show{opacity:1;pointer-events:all;}
.celeb-dino{font-size:110px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes popIn{from{transform:scale(0) rotate(-30deg);}to{transform:scale(1) rotate(0deg);}}
.celeb-text{font-size:30px;font-weight:800;color:var(--green);text-align:center;}
.celeb-sub{font-size:15px;color:var(--text2);text-align:center;}
.celeb-tap{margin-top:4px;font-size:13px;color:var(--text2);opacity:.7;}
.celeb-loading{font-size:15px;color:var(--accent);font-weight:700;}
.celeb-loading::after{content:'';animation:dots 1.4s steps(4,end) infinite;}
@keyframes dots{0%{content:'';}25%{content:'.';}50%{content:'..';}75%{content:'...';}100%{content:'';}}

/* AI result card in celebrate */
.celeb-ai-box{background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.3);border-radius:20px;padding:16px 24px;text-align:center;min-width:220px;}
.celeb-food-emoji{font-size:54px;line-height:1;margin-bottom:6px;}
.celeb-cal{font-size:36px;font-weight:800;color:var(--yellow);line-height:1;margin-bottom:6px;}
.celeb-cal-unit{font-size:16px;font-weight:700;color:var(--yellow);opacity:.8;}
.celeb-cheer{font-size:18px;font-weight:700;color:var(--green);}

/* Settings */
.settings-note{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:16px;text-align:center;}
.api-input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:14px;font-size:14px;color:var(--text);font-family:'Space Grotesk',sans-serif;margin-bottom:12px;outline:none;}
.api-input::placeholder{color:var(--text2);}
.api-input:focus{border-color:var(--accent);}
.save-btn{width:100%;background:linear-gradient(135deg,#7c3aed,#a78bfa);border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:700;color:white;cursor:pointer;font-family:'Space Grotesk',sans-serif;margin-bottom:10px;}
.skip-btn{width:100%;background:none;border:none;padding:10px;font-size:14px;color:var(--text2);cursor:pointer;font-family:'Space Grotesk',sans-serif;}

/* Confetti */
.confetti{position:absolute;width:10px;height:10px;border-radius:50%;animation:fall var(--d) linear forwards;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}

input[type=file]{display:none;}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<input type="file" id="photoInput" accept="image/*" capture="environment">

<!-- MAIN PAGE -->

  <div class="header">

    <div class="header-right">
      <div class="date-chip" id="todayLabel"></div>

<!-- Meal type modal -->
<div class="modal-overlay" id="mealTypeModal">

<!-- Settings modal -->

<script>
// ===== STARS =====
(()=>{
  const s=document.getElementById('stars');
  for(let i=0;i<90;i++){
    const d=document.createElement('div');d.className='star';
    const sz=Math.random()*3+1;
    d.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+1.5).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s`;
    s.appendChild(d);
  }
})();

// ===== INDEXEDDB =====
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('GoshaEats',1);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('meals')){
        const st=d.createObjectStore('meals',{keyPath:'id',autoIncrement:true});
        st.createIndex('date','date',{unique:false});
      }
    };
    r.onsuccess=e=>{db=e.target.result;res(db);};
    r.onerror=()=>rej(r.error);
  });
}
const tx=(mode)=>db.transaction('meals',mode).objectStore('meals');
function dbAdd(m){return new Promise((res,rej)=>{const r=tx('readwrite').add(m);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function dbAll(){return new Promise((res,rej)=>{const r=tx('readonly').getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function dbDel(id){return new Promise((res,rej)=>{const r=tx('readwrite').delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}

// ===== CONSTANTS =====
const MEAL={
  breakfast:{emoji:'🌅',name:'Завтрак'},
  lunch:{emoji:'☀️',name:'Обед'},
  dinner:{emoji:'🌙',name:'Ужин'},
  snack:{emoji:'🍎',name:'Перекус'}
};
const CELEBRATES=[
  {dino:'🦕',text:'Молодец, Гоша!',sub:'Дино тебя обнимает!'},
  {dino:'🦖',text:'Отличное фото!',sub:'Ты настоящий космонавт!'},
  {dino:'🚀',text:'В космос!',sub:'Супер-Гоша, супер-еда!'},
  {dino:'⭐',text:'Звёздный герой!',sub:'Дино гордится тобой!'},
  {dino:'🌌',text:'Галактика!',sub:'Самый лучший!'}
];
const TODAY=new Date().toISOString().slice(0,10);
let pendingType=null;
let celebLoading=false;

// ===== HELPERS =====
function fmtDate(d){
  const m=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  const dt=new Date(d+'T12:00:00');
  return dt.getDate()+' '+m[dt.getMonth()];
}
function fmtTime(ts){
  const d=new Date(ts);
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
function calcStreak(meals){
  const dates=new Set(meals.map(m=>m.date));
  let streak=0;
  const d=new Date(TODAY);
  while(dates.has(d.toISOString().slice(0,10))){
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function todayCalories(meals){
  return meals.filter(m=>m.date===TODAY&&m.cal).reduce((s,m)=>s+(m.cal||0),0);
}

// ===== API KEY =====
function getApiKey(){return localStorage.getItem('goshaApiKey')||'';}
function openSettings(){
  document.getElementById('apiKeyInput').value=getApiKey();
  document.getElementById('settingsModal').classList.add('open');
}
function closeSettings(){document.getElementById('settingsModal').classList.remove('open');}
function doSaveApiKey(){
  const k=document.getElementById('apiKeyInput').value.trim();
  if(k)localStorage.setItem('goshaApiKey',k);
  closeSettings();
  if(k)alert('Ключ сохранён! Теперь дино будет считать калории 🦕');
}

// ===== CLAUDE VISION =====
async function resizeImage(dataUrl,maxDim=1024){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const scale=Math.min(1,maxDim/img.width,maxDim/img.height);
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*scale);
      c.height=Math.round(img.height*scale);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg',0.85));
    };
    img.src=dataUrl;
  });
}

async function analyzeWithClaude(dataUrl){
  const key=getApiKey();
  if(!key)return null;
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),10000);
  try{
    const small=await resizeImage(dataUrl);
    const comma=small.indexOf(',');
    const mediaType=small.slice(5,small.indexOf(';'));
    const base64=small.slice(comma+1);
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      signal:ctrl.signal,
      method:'POST',
      headers:{
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'content-type':'application/json',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-opus-4-8',
        max_tokens:200,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
          {type:'text',text:'Посмотри на фото с едой. Ответь ТОЛЬКО одной строкой JSON без объяснений:\n{"food":"название 1-3 слова","cal":число_калорий_целое,"emoji":"один emoji еды","cheer":"мотивация 2-3 слова + emoji"}'}
        ]}]
      })
    });
    const data=await resp.json();
    if(!data.content||!data.content[0])return null;
    const raw=data.content[0].text.trim().replace(/```json?\s*/g,'').replace(/```/g,'').trim();
    const j=JSON.parse(raw);
    return {
      food:String(j.food||'').slice(0,40),
      cal:Math.max(0,Math.round(Number(j.cal)||0)),
      emoji:String(j.emoji||'🍽️').slice(0,4),
      cheer:String(j.cheer||'').slice(0,30)
    };
  }catch(e){return null;}
  finally{clearTimeout(timer);}
}

// ===== PAGES =====
function showPage(p){
  document.getElementById('pageMain').style.display=p==='main'?'':'none';
  document.getElementById('pageHistory').style.display=p==='history'?'':'none';
  document.getElementById('navMain').className='nav-btn'+(p==='main'?' active':'');
  document.getElementById('navHistory').className='nav-btn'+(p==='history'?' active':'');
  if(p==='history')renderHistory();
}

// ===== MAIN =====
function mealCardExtra(m){
  if(m.cal)return `<div class="meal-card-cal">${m.foodEmoji||'🍽️'} <b>${m.cal}</b> ккал</div>`;
  if(m.note)return `<div class="meal-card-analysis">🤖 ${m.note}</div>`;
  return '';
}

function renderToday(meals){
  const today=meals.filter(m=>m.date===TODAY);
  const grid=document.getElementById('todayGrid');
  if(!today.length){
    grid.innerHTML='<div class="empty-state"><span class="empty-emoji">🍽️</span>Ещё нет фото — сфотографируй первую еду!</div>';
  } else {
    grid.innerHTML=today.map(m=>`
      <div class="meal-card">
        <img src="${m.photo}" alt="${MEAL[m.type].name}">
        <div class="meal-card-label">${MEAL[m.type].emoji} ${MEAL[m.type].name}<span class="meal-card-time">${fmtTime(m.ts)}</span></div>
        <button class="meal-card-del" onclick="deleteMeal(${m.id})">✕</button>
        ${mealCardExtra(m)}
      </div>`).join('');
  }
  const msgs=['Привет! Сфотографируй свою еду!','Одно фото — отлично! 🌟','Два фото — ты звезда! 🚀','Три фото — дино в восторге! 🦕','Четыре фото — чемпион! 🏆','Уже пять фото! Космос! 🌌'];
  const dinos=['🦕','🦕','🦖','🚀','⭐','🌌'];
  const i=Math.min(today.length,msgs.length-1);
  document.getElementById('dinoSay').textContent=msgs[i];
  document.getElementById('dinoEmoji').textContent=dinos[i];
  // Streak + daily cal chips
  const streak=calcStreak(meals);
  const cal=todayCalories(meals);
  let chips='';
  if(streak>1)chips+=`<div class="dino-chip fire">🔥 ${streak} дней</div>`;
  if(cal>0)chips+=`<div class="dino-chip spark">⚡ ${cal} ккал</div>`;
  document.getElementById('dinoChips').innerHTML=chips;
}

// ===== ADD MEAL =====
function startAddMeal(){
  document.querySelectorAll('.mt-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('mealTypeModal').classList.add('open');
}
function selectMealType(type,btn){
  pendingType=type;
  document.querySelectorAll('.mt-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('mealTypeModal').classList.remove('open');
  setTimeout(()=>document.getElementById('photoInput').click(),250);
}

document.getElementById('photoInput').addEventListener('change',async function(){
  if(!this.files||!this.files[0]||!pendingType)return;
  const type=pendingType;
  pendingType=null;
  const reader=new FileReader();
  reader.onload=async e=>{
    const dataUrl=e.target.result;
    this.value='';
    const hasKey=!!getApiKey();
    showCelebrate(hasKey);
    let ai=null;
    if(hasKey){
      ai=await analyzeWithClaude(dataUrl);
      if(ai&&ai.cal){
        document.getElementById('celebFoodEmoji').textContent=ai.emoji;
        document.getElementById('celebCalNum').textContent=ai.cal;
        document.getElementById('celebCheer').textContent=ai.cheer;
        document.getElementById('celebAiBox').style.display='block';
      }
      document.getElementById('celebLoading').style.display='none';
      document.getElementById('celebTap').style.display='block';
      celebLoading=false;
    }
    await dbAdd({
      date:TODAY,type,photo:dataUrl,ts:Date.now(),
      note:ai?ai.food:'',
      cal:ai?ai.cal:0,
      foodEmoji:ai?ai.emoji:''
    });
    renderToday(await dbAll());
  };
  reader.readAsDataURL(this.files[0]);
});

async function deleteMeal(id){
  if(!confirm('Удалить это фото?'))return;
  await dbDel(id);
  renderToday(await dbAll());
}

// ===== CELEBRATE =====
function showCelebrate(loading){
  celebLoading=!!loading;
  const c=CELEBRATES[Math.floor(Math.random()*CELEBRATES.length)];
  document.getElementById('celebDino').textContent=c.dino;
  document.getElementById('celebText').textContent=c.text;
  document.getElementById('celebSub').textContent=c.sub;
  document.getElementById('celebLoading').style.display=loading?'block':'none';
  document.getElementById('celebAiBox').style.display='none';
  document.getElementById('celebTap').style.display=loading?'none':'block';
  const cel=document.getElementById('celebrate');
  cel.querySelectorAll('.confetti').forEach(e=>e.remove());
  const colors=['#a78bfa','#4ade80','#fbbf24','#f87171','#60a5fa','#f472b6'];
  for(let i=0;i<30;i++){
    const dot=document.createElement('div');dot.className='confetti';
    dot.style.cssText=`left:${Math.random()*100}%;background:${colors[i%colors.length]};--d:${(Math.random()*2+1).toFixed(1)}s;animation-delay:${(Math.random()*.5).toFixed(2)}s`;
    cel.appendChild(dot);
  }
  cel.classList.add('show');
}
function hideCelebrate(){
  if(celebLoading)return;
  document.getElementById('celebrate').classList.remove('show');
}

// ===== HISTORY =====
async function renderHistory(){
  const meals=await dbAll();
  const days=new Set(meals.map(m=>m.date)).size;
  const cnt={breakfast:0,lunch:0,dinner:0,snack:0};
  meals.forEach(m=>{if(cnt[m.type]!==undefined)cnt[m.type]++;});
  const calMeals=meals.filter(m=>m.cal);
  const totalCal=calMeals.reduce((s,m)=>s+(m.cal||0),0);
  const calDays=new Set(calMeals.map(m=>m.date)).size;
  const avgCal=calDays?Math.round(totalCal/calDays):0;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><span class="stat-val">${meals.length}</span><span class="stat-lbl">Фото</span></div>
    <div class="stat-card"><span class="stat-val">${days}</span><span class="stat-lbl">Дней</span></div>
    <div class="stat-card"><span class="stat-val">${calcStreak(meals)}🔥</span><span class="stat-lbl">Стрик</span></div>
    <div class="stat-card"><span class="stat-val">${avgCal||'—'}</span><span class="stat-lbl">ккал/день</span></div>`;
  const byDate={};
  meals.forEach(m=>{(byDate[m.date]=byDate[m.date]||[]).push(m);});
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  document.getElementById('historyList').innerHTML=dates.map(d=>{
    const dayCal=byDate[d].filter(m=>m.cal).reduce((s,m)=>s+(m.cal||0),0);
    return `<div class="hist-day">
      <div class="hist-day-title">${d===TODAY?'🌟 Сегодня':fmtDate(d)}${dayCal?` <span style="color:var(--yellow);font-size:12px;">⚡${dayCal} ккал</span>`:''}</div>
      <div class="meal-grid">${byDate[d].map(m=>`
        <div class="meal-card">
          <img src="${m.photo}" alt="${MEAL[m.type].name}">
          <div class="meal-card-label">${MEAL[m.type].emoji} ${MEAL[m.type].name}<span class="meal-card-time">${fmtTime(m.ts)}</span></div>
          ${mealCardExtra(m)}
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}
